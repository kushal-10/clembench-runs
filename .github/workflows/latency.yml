name: Run calculate_latency.py on Push

on:
  push:
    branches:
      - feat/llmcalc  # Only run when there's a push on this branch

jobs:
  run-calculate-latency:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10  # Adjust the Python version if needed
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas  # Add other dependencies here if necessary

      - name: Run calculate_latency.py script
        run: |
          python calculate_latency.py  # This will execute your script
          
      - name: Commit and Push CSV files
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add Addenda/latency_csvs/*.csv  # Adjust the path if necessary
          git commit -m "Updated latency csvs on push"
          git push
